<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Haruka's Gallery — A Birthday Gift</title>
  <link rel="stylesheet" href="style.css" />
  <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
  <script type="importmap">
  {
    "imports": {
      "three":             "https://unpkg.com/three@0.158.0/build/three.module.js",
      "three/addons/":     "https://unpkg.com/three@0.158.0/examples/jsm/",
      "@pixiv/three-vrm": "https://unpkg.com/@pixiv/three-vrm@2.1.0/lib/three-vrm.module.js"
    }
  }
  </script>
</head>
<body>

  <!-- ── Loading Screen ── -->
  <div id="loading-screen">
    <div class="loading-inner">
      <div class="loading-logo">
        <!--
          三葉草 SVG：三個愛心，尖端朝向中心，各旋轉 0°/120°/240°
          每個 <path> 是一顆心形，tip 在原點下方，圓弧朝外
        -->
        <!--
          三葉草：三個愛心葉片，各自的「尖端」指向中心，「圓弧」朝外。
          每個 <path> 從尖端(0,0)出發，貝塞爾曲線往外形成心形。
          translate(0,-14) 把整顆心往外推，使尖端靠近中心。
        -->
        <svg viewBox="-40 -40 80 80" xmlns="http://www.w3.org/2000/svg">

          <!-- 愛心 1（朝上，圓弧在上方） -->
          <g transform="rotate(0)">
            <path transform="translate(0,-13)"
                  d="M0,0 C-2,-6 -13,-6 -13,-16 C-13,-25 0,-24 0,-17 C0,-24 13,-25 13,-16 C13,-6 2,-6 0,0Z"
                  fill="#88dd44" opacity="0.93"/>
          </g>

          <!-- 愛心 2（朝右下 120°） -->
          <g transform="rotate(120)">
            <path transform="translate(0,-13)"
                  d="M0,0 C-2,-6 -13,-6 -13,-16 C-13,-25 0,-24 0,-17 C0,-24 13,-25 13,-16 C13,-6 2,-6 0,0Z"
                  fill="#88dd44" opacity="0.93"/>
          </g>

          <!-- 愛心 3（朝左下 240°） -->
          <g transform="rotate(240)">
            <path transform="translate(0,-13)"
                  d="M0,0 C-2,-6 -13,-6 -13,-16 C-13,-25 0,-24 0,-17 C0,-24 13,-25 13,-16 C13,-6 2,-6 0,0Z"
                  fill="#88dd44" opacity="0.93"/>
          </g>

          <!-- 中心接合圓 -->
          <circle cx="0" cy="0" r="4.5" fill="#88dd44"/>
        </svg>
      </div>
      <div class="loading-title">Haruka's Gallery</div>
      <div id="loading-text">正在前往畫展... 0%</div>
      <div class="loading-bar-outer">
        <div id="loading-bar" class="loading-bar-inner"></div>
      </div>
      <div class="loading-sub">Happy Birthday 🎂</div>
    </div>
  </div>

  <!-- ── HUD ── -->
  <div id="hud">
    <div id="compass">
      <svg viewBox="0 0 36 36">
        <circle cx="18" cy="18" r="16" stroke="#99CCFF" stroke-width="1.5" fill="none"/>
        <polygon id="compass-needle" points="18,4 21,18 18,22 15,18" fill="#88dd44"/>
        <polygon points="18,32 21,18 18,14 15,18" fill="#ccc" opacity="0.5"/>
      </svg>
    </div>
    <div id="controls-hint">
      <span>WASD</span> 移動　<span>滑鼠拖曳</span> 視角　<span>點擊畫作</span> 觀賞
    </div>
  </div>

  <!-- ── Artwork Panel ── -->
  <div id="artwork-panel" class="hidden">
    <button id="panel-close">✕</button>
    <div id="panel-label">A R T W O R K</div>
    <h2 id="panel-title"></h2>
    <div id="panel-divider"></div>
    <p id="panel-desc"></p>
    <div id="panel-meta"></div>
  </div>

  <canvas id="canvas"></canvas>
  <script type="module" src="main.js"></script>
</body>
</html>
